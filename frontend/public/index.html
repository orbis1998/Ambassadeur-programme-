<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="VSM Collection — Programme Ambassadeur officiel. Vivre avec style." />
        <meta name="mobile-web-app-capable" content="yes" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="icon" href="%PUBLIC_URL%/icons/file_000000008e6471f4811ba9633a86cab4.png" type="image/png" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/image_1782342973184.jpeg" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="VSM Ambassador" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <title>VSM Ambassador — Programme officiel</title>
        <style>
            #app-splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
            }
            #app-splash img {
                width: 11rem;
                max-width: 70vw;
                height: auto;
            }
            #app-splash.hide {
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.35s ease;
            }
        </style>
        <script>
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
          }
        </script>
    </head>
    <body>
        <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
        <div id="app-splash" aria-hidden="true">
            <img src="%PUBLIC_URL%/icons/logo-original.png" alt="VSM Ambassador Program" />
        </div>
        <div id="root"></div>
    </body>
</html>
